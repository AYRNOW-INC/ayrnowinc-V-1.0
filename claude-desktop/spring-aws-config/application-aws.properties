# =============================================================
# AYRNOW — AWS Profile (activated by SPRING_PROFILES_ACTIVE=aws)
# All sensitive values come from EB environment variables.
# =============================================================

# Server — EB expects port 5000
server.port=${SERVER_PORT:5000}

# Database — RDS PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool — tuned for t3.micro (1 GB RAM)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
stripe.success-url=${STRIPE_SUCCESS_URL:https://your-domain.com/payment/success}
stripe.cancel-url=${STRIPE_CANCEL_URL:https://your-domain.com/payment/cancel}

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-minutes=${JWT_ACCESS_MINUTES:30}
jwt.refresh-token-days=${JWT_REFRESH_DAYS:7}

# CORS — update with your actual frontend domain
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=${FILE_UPLOAD_DIR:/tmp/uploads}

# Logging — production level, CloudWatch friendly
logging.level.root=INFO
logging.level.com.ayrnow=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
