# =============================================================
# AYRNOW — GitHub Actions: Build & Deploy to AWS Elastic Beanstalk
# =============================================================
# Triggers on push to main branch (backend changes only).
# Builds the Spring Boot JAR with Maven + JDK 21,
# then deploys to Elastic Beanstalk.
#
# REQUIRED GITHUB SECRETS (repo Settings > Secrets > Actions):
#   AWS_ACCESS_KEY_ID       - IAM deploy user access key
#   AWS_SECRET_ACCESS_KEY   - IAM deploy user secret key
#   AWS_REGION              - e.g. us-east-1
#   EB_APPLICATION_NAME     - e.g. ayrnow-backend
#   EB_ENVIRONMENT_NAME     - e.g. ayrnow-backend-env
# =============================================================

name: Deploy AYRNOW Backend to Elastic Beanstalk

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.ebextensions/**'
      - '.github/workflows/deploy-to-eb.yml'

  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. JDK 21 (Amazon Corretto — same as Elastic Beanstalk)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      # 3. Build JAR
      - name: Build with Maven
        working-directory: backend
        run: mvn clean package -DskipTests -B

      # 4. Create deployment package
      - name: Create deployment package
        run: |
          mkdir -p deploy-package/.ebextensions

          # Fat JAR
          cp backend/target/ayrnow-backend-*-SNAPSHOT.jar deploy-package/application.jar

          # Procfile — tells EB how to start the app
          echo "web: java -jar application.jar --server.port=5000" > deploy-package/Procfile

          # EB extensions
          cp -r .ebextensions/* deploy-package/.ebextensions/ 2>/dev/null || true

          # ZIP it
          cd deploy-package
          zip -r ../ayrnow-deploy-${{ github.sha }}.zip .

      # 5. AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 6. Deploy to EB
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ secrets.EB_APPLICATION_NAME }}
          environment_name: ${{ secrets.EB_ENVIRONMENT_NAME }}
          version_label: "ayrnow-${{ github.sha }}"
          region: ${{ secrets.AWS_REGION }}
          deployment_package: ayrnow-deploy-${{ github.sha }}.zip
          use_existing_version_if_available: true

      # 7. Health check
      - name: Verify deployment
        run: |
          echo "Waiting 30s for deployment to stabilize..."
          sleep 30
          aws elasticbeanstalk describe-environment-health \
            --environment-name ${{ secrets.EB_ENVIRONMENT_NAME }} \
            --attribute-names All \
            --region ${{ secrets.AWS_REGION }} || echo "Health check pending..."
