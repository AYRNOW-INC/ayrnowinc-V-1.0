# AYRNOW Backend Configuration
spring.application.name=ayrnow

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ayrnow}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ayrnow}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ayrnow}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production-min-32-chars!!}
jwt.access-token-minutes=${JWT_ACCESS_MINUTES:30}
jwt.refresh-token-days=${JWT_REFRESH_DAYS:7}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
stripe.success-url=${STRIPE_SUCCESS_URL:http://localhost:8080/payment/success}
stripe.cancel-url=${STRIPE_CANCEL_URL:http://localhost:8080/payment/cancel}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=${FILE_UPLOAD_DIR:./uploads}

# Server
server.port=8080

# Logging
logging.level.com.ayrnow=DEBUG
logging.level.org.springframework.security=INFO
